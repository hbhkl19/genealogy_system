{% extends "base.html" %}
{% block title %}树形预览{% endblock %}
{% block content %}
<h1 class="h3 mb-3">{{ genealogy.name }}树形预览</h1>
<div class="tree-list">
  {% for member in roots %}
    <div class="tree-node">
      <span class="badge text-bg-light">第 {{ member.generation_no }} 代</span>
      {{ member.name }} <span class="text-secondary">#{{ member.id }}</span>
    </div>
  {% else %}
    <div class="empty-state">暂无根节点成员。添加成员和父子关系后可扩展为完整折叠树。</div>
  {% endfor %}
</div>
{% endblock %}
