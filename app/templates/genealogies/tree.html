{% extends "base.html" %}
{% block title %}树形预览{% endblock %}
{% block content %}
<h1 class="h3 mb-1">{{ genealogy.name }}树形预览</h1>

<ul class="nav nav-tabs mb-3" id="treeTab" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="indent-tab" data-bs-toggle="tab" data-bs-target="#indent-panel" type="button" role="tab">缩进树</button>
  </li>
  <li class="nav-item" role="presentation">
    <button class="nav-link" id="svg-tab" data-bs-toggle="tab" data-bs-target="#svg-panel" type="button" role="tab">图形树</button>
  </li>
</ul>

<div class="tab-content" id="treeTabContent">
  <div class="tab-pane fade show active" id="indent-panel" role="tabpanel">
    <p class="text-secondary mb-3" id="tree-info">点击 <strong>[+]</strong> 展开分支，按需加载</p>

    <div class="tree-toolbar mb-3">
      <button class="btn btn-sm btn-outline-primary" type="button" onclick="loadIndentRoots()">回到初始预览</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="collapseAll()">全部折叠</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="expandToDepth(2)">展开到第 2 代</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="expandToDepth(3)">展开到第 3 代</button>
      <button class="btn btn-sm btn-outline-secondary" onclick="expandToDepth(5)">展开到第 5 代</button>
      <div class="tree-id-search">
        <input class="form-control form-control-sm" id="indentFocusMemberInput" type="number" min="1" placeholder="成员 ID">
        <button class="btn btn-sm btn-outline-secondary" type="button" onclick="focusIndentMember()">定位</button>
      </div>
    </div>

    <div class="tree-container" id="tree-container">
      <div class="tree-loading">加载中...</div>
    </div>
  </div>

  <div class="tab-pane fade" id="svg-panel" role="tabpanel">
    <section class="lazy-tree-panel">
      <div class="lazy-tree-toolbar">
        <button class="btn btn-primary" type="button" id="loadRootsButton">加载根成员</button>
        <div class="lazy-tree-search">
          <input class="form-control" id="focusMemberInput" type="number" min="1" placeholder="输入成员 ID 定位">
          <button class="btn btn-outline-secondary" type="button" id="focusMemberButton">定位</button>
        </div>
        <button class="btn btn-outline-secondary" type="button" id="clearTreeButton">清空画布</button>
      </div>
      <div class="lazy-tree-status" id="lazyTreeStatus">图形树不会一次性加载全族谱，请先加载根成员或输入成员 ID 定位。定位后成员居中，左侧展开祖先，右侧展开后代。</div>
      <div class="lazy-tree-canvas" id="lazyTreeCanvas">
        <svg id="lazyTreeSvg" width="960" height="420" role="img" aria-label="懒加载图形族谱树"></svg>
      </div>
    </section>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const gid = {{ genealogy.id }};

  (function () {
    var indentTab = document.getElementById('indent-tab');
    var svgTab = document.getElementById('svg-tab');
    var svgInitialized = false;

    svgTab.addEventListener('shown.bs.tab', function () {
      if (!svgInitialized) {
        initSvgTree();
        svgInitialized = true;
      }
    });
  })();

  function buildNodeHtml(member, depth, hasChildren, spouses) {
    const indent = depth * 24;
    let badgeClass = member.gender === 'male' ? '' : 'text-bg-light';
    let badgeText = member.generation_no + '代';

    let spouseHtml = '';
    if (spouses && spouses.length > 0) {
      var spouseLinks = spouses.map(function (sp) {
        return '<a href="/members/' + sp.id + '/relations">' + escapeHtml(sp.name) + '</a>';
      });
      spouseHtml = ' <span class="text-secondary ms-1" style="font-size:0.85rem">配偶: ' + spouseLinks.join('、') + '</span>';
    }

    let toggleHtml = '';
    if (hasChildren) {
      toggleHtml = '<span class="tree-toggle collapsed" data-mid="' + member.id + '" data-depth="' + depth + '" title="展开子女">[+]</span>';
    } else {
      toggleHtml = '<span class="tree-toggle leaf"></span>';
    }

    let genderIcon = member.gender === 'male'
      ? '<span style="color:#4a7eb5" title="男">♂</span>'
      : '<span style="color:#c97586" title="女">♀</span>';

    return '<div class="tree-row" style="padding-left:' + indent + 'px" data-mid="' + member.id + '" data-depth="' + depth + '">'
      + toggleHtml
      + '<span class="tree-node-body">'
      + genderIcon + ' '
      + '<a href="/members/' + member.id + '/relations">' + escapeHtml(member.name) + '</a>'
      + ' <span class="badge ' + badgeClass + '">' + badgeText + '</span>'
      + spouseHtml
      + '</span>'
      + '</div>'
      + '<div class="tree-children" id="children-' + member.id + '"></div>';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  function bindToggles(container) {
    (container || document).querySelectorAll('.tree-toggle:not(.leaf):not(.bound)').forEach(function (el) {
      el.classList.add('bound');
      el.addEventListener('click', function () {
        var mid = this.dataset.mid;
        var depth = parseInt(this.dataset.depth);
        if (this.classList.contains('collapsed')) {
          loadChildren(this, mid, depth);
        } else {
          collapseNode(this, mid);
        }
      });
    });
  }

  function collapseNode(toggleEl, mid) {
    toggleEl.classList.add('collapsed');
    toggleEl.textContent = '[+]';
    toggleEl.title = '展开子女';
    document.getElementById('children-' + mid).innerHTML = '';
  }

  function collapseAll() {
    const container = document.getElementById('tree-container');
    container.querySelectorAll('.tree-toggle:not(.leaf)').forEach(function (el) {
      collapseNode(el, el.dataset.mid);
    });
  }

  function loadChildren(toggleEl, mid, depth) {
    toggleEl.textContent = '[...]';
    toggleEl.title = '加载中...';
    fetch('/genealogies/' + gid + '/tree/children/' + mid)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        var html = '';
        data.children.forEach(function (child) {
          html += buildNodeHtml(child, depth + 1, child.has_children, child.spouses);
        });
        document.getElementById('children-' + mid).innerHTML = html;
        toggleEl.classList.remove('collapsed');
        toggleEl.textContent = '[-]';
        toggleEl.title = '折叠子女';
        bindToggles(document.getElementById('children-' + mid));
      })
      .catch(function (err) {
        toggleEl.textContent = '[!]';
        toggleEl.title = '加载失败, 点击重试';
        console.error(err);
      });
  }

  function expandToDepth(maxDepth) {
    var container = document.getElementById('tree-container');
    var rootRows = Array.from(container.querySelectorAll(':scope > .tree-row'));
    if (rootRows.length === 0) {
      document.getElementById('tree-info').innerHTML = '<span class="text-warning">当前没有可展开的根节点。</span>';
      return;
    }
    var rootDepth = Math.min.apply(null, rootRows.map(function (row) {
      return parseInt(row.dataset.depth || '0', 10);
    }));
    var targetDepth = rootDepth + maxDepth - 1;
    document.getElementById('tree-info').innerHTML = '正在展开到第 ' + maxDepth + ' 代...';
    expandVisibleTogglesUntil(targetDepth).then(function () {
      document.getElementById('tree-info').innerHTML = '已展开到当前视图的第 ' + maxDepth + ' 代。';
    });
  }

  async function expandVisibleTogglesUntil(targetDepth) {
    while (true) {
      var toggles = Array.from(document.querySelectorAll('#tree-container .tree-toggle.collapsed:not(.leaf)'))
        .filter(function (tog) {
          return parseInt(tog.dataset.depth || '0', 10) < targetDepth;
        });
      if (toggles.length === 0) return;
      await Promise.all(toggles.map(function (tog) {
        return loadChildrenPromise(tog, tog.dataset.mid, parseInt(tog.dataset.depth || '0', 10));
      }));
    }
  }

  function loadChildrenPromise(toggleEl, mid, depth) {
    return new Promise(function (resolve) {
      toggleEl.textContent = '[...]';
      fetch('/genealogies/' + gid + '/tree/children/' + mid)
        .then(function (r) { return r.json(); })
        .then(function (data) {
          var html = '';
          data.children.forEach(function (child) {
            html += buildNodeHtml(child, depth + 1, child.has_children, child.spouses);
          });
          document.getElementById('children-' + mid).innerHTML = html;
          toggleEl.classList.remove('collapsed');
          toggleEl.textContent = '[-]';
          bindToggles(document.getElementById('children-' + mid));
          resolve();
        })
        .catch(function () { resolve(); });
    });
  }

  function focusIndentMember() {
    var input = document.getElementById('indentFocusMemberInput');
    var mid = parseInt(input.value, 10);
    if (!mid) {
      document.getElementById('tree-info').innerHTML = '<span class="text-warning">请输入有效的成员 ID。</span>';
      return;
    }
    document.getElementById('tree-info').innerHTML = '正在定位成员 #' + mid + '...';
    fetch('/genealogies/' + gid + '/tree/member/' + mid)
      .then(function (r) {
        if (!r.ok) throw new Error('not found');
        return r.json();
      })
      .then(function (member) {
        document.getElementById('tree-container').innerHTML = buildNodeHtml(member, 0, member.has_children, member.spouses);
        bindToggles(document.getElementById('tree-container'));
        document.getElementById('tree-info').innerHTML = '已定位到 <strong>' + escapeHtml(member.name) + '</strong> #' + member.id + '，可点击 <strong>[+]</strong> 或使用“展开到第 N 代”展开该分支。';
      })
      .catch(function () {
        document.getElementById('tree-info').innerHTML = '<span class="text-danger">定位失败：请确认成员 ID 属于当前族谱。</span>';
      });
  }

  document.addEventListener('DOMContentLoaded', function () {
    var input = document.getElementById('indentFocusMemberInput');
    if (input) {
      input.addEventListener('keydown', function (event) {
        if (event.key === 'Enter') {
          event.preventDefault();
          focusIndentMember();
        }
      });
    }
  });

  function loadIndentRoots() {
    document.getElementById('indentFocusMemberInput').value = '';
    document.getElementById('tree-info').innerHTML = '正在加载初始预览...';
    document.getElementById('tree-container').innerHTML = '<div class="tree-loading">加载中...</div>';
    fetch('/genealogies/' + gid + '/tree/roots')
      .then(function (r) { return r.json(); })
      .then(function (roots) {
        var html = '';
        var maleRoots = 0, femaleRoots = 0, withChildren = 0;
        roots.forEach(function (root) {
          html += buildNodeHtml(root, 0, root.has_children, root.spouses);
          if (root.gender === 'male') maleRoots++; else femaleRoots++;
          if (root.has_children) withChildren++;
        });
        document.getElementById('tree-container').innerHTML = html
          || '<div class="tree-empty">暂无根节点（始祖）。</div>';
        bindToggles(document.getElementById('tree-container'));

        var info = '共 <strong>' + roots.length + '</strong> 个始祖';
        if (femaleRoots > 0) info += '（' + maleRoots + ' 男, ' + femaleRoots + ' 女）';
        info += ', 其中 ' + withChildren + ' 人有后代。点击 <strong>[+]</strong> 展开分支。';
        document.getElementById('tree-info').innerHTML = info;
      })
      .catch(function (err) {
        document.getElementById('tree-container').innerHTML = '<div class="tree-empty">加载失败。</div>';
        document.getElementById('tree-info').innerHTML = '<span class="text-danger">初始预览加载失败。</span>';
        console.error(err);
      });
  }

  loadIndentRoots();

  function initSvgTree() {
    const nodeLimit = 500;
    const nodeWidth = 168;
    const nodeHeight = 74;
    const columnGap = 220;
    const rowGap = 112;
    const svg = document.getElementById("lazyTreeSvg");
    const status = document.getElementById("lazyTreeStatus");
    const nodes = new Map();
    const edges = new Set();
    const expandedChildren = new Set();
    const expandedParents = new Set();
    let activeNodeId = null;
    let centeredMode = false;

    function setStatus(message, kind) {
      kind = kind || "info";
      status.textContent = message;
      status.dataset.kind = kind;
    }

    function escapeText(value) {
      return String(value || "").replace(/[&<>"']/g, function (char) {
        return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char];
      });
    }

    async function getJson(url) {
      const response = await fetch(url, { headers: { "Accept": "application/json" } });
      if (!response.ok) {
        throw new Error("HTTP " + response.status);
      }
      return response.json();
    }

    function addNode(member, column) {
      if (nodes.has(member.id)) {
        var existing = nodes.get(member.id);
        var merged = Object.assign({}, existing, member);
        if (typeof column === "number") {
          merged._column = column;
        }
        nodes.set(member.id, merged);
        return false;
      }
      if (nodes.size >= nodeLimit) {
        setStatus("当前可视节点已达到 500 个，请清空画布后通过成员 ID 定位继续查看。", "warning");
        return false;
      }
      if (typeof column === "number") {
        member._column = column;
      }
      nodes.set(member.id, member);
      return true;
    }

    function addEdge(parentId, childId) {
      if (nodes.has(parentId) && nodes.has(childId)) {
        edges.add(parentId + "->" + childId);
      }
    }

    function clearTree() {
      nodes.clear();
      edges.clear();
      expandedChildren.clear();
      expandedParents.clear();
      activeNodeId = null;
      centeredMode = false;
      draw();
      setStatus("画布已清空。");
    }

    function groupedNodes() {
      const groups = new Map();
      for (const node of nodes.values()) {
        const column = typeof node._column === "number" ? node._column : (node.generation_no || 1);
        if (!groups.has(column)) {
          groups.set(column, []);
        }
        groups.get(column).push(node);
      }
      return Array.from(groups.entries())
        .sort(function (a, b) { return a[0] - b[0]; })
        .map(function (entry) {
          return [entry[0], entry[1].sort(function (a, b) { return a.id - b.id; })];
        });
    }

    function layoutNodes() {
      const positions = new Map();
      const groups = groupedNodes();
      const centerX = 396;
      var minX = Infinity;
      var maxX = 0;
      groups.forEach(function (pair) {
        var column = pair[0];
        var members = pair[1];
        var columnIndex = groups.findIndex(function (g) { return g[0] === column; });
        members.forEach(function (member, rowIndex) {
          var x = centeredMode ? centerX + column * columnGap : 28 + columnIndex * columnGap;
          var y = 28 + rowIndex * rowGap;
          minX = Math.min(minX, x);
          maxX = Math.max(maxX, x + nodeWidth);
          positions.set(member.id, {
            x: x,
            y: y,
            column: column,
          });
        });
      });
      if (centeredMode && minX < 28) {
        var shiftX = 28 - minX;
        positions.forEach(function (pos) {
          pos.x += shiftX;
        });
        maxX += shiftX;
      }
      const maxRows = Math.max.apply(null, [1].concat(groups.map(function (pair) { return pair[1].length; })));
      svg.setAttribute("width", Math.max(960, maxX + 56));
      svg.setAttribute("height", Math.max(420, 80 + maxRows * rowGap));
      return positions;
    }

    function draw() {
      const positions = layoutNodes();
      const edgeMarkup = Array.from(edges).map(function (edgeKey) {
        var parts = edgeKey.split("->");
        var parentId = Number(parts[0]);
        var childId = Number(parts[1]);
        const parent = positions.get(parentId);
        const child = positions.get(childId);
        if (!parent || !child) return "";
        const x1 = parent.x + nodeWidth;
        const y1 = parent.y + nodeHeight / 2;
        const x2 = child.x;
        const y2 = child.y + nodeHeight / 2;
        return '<line class="lazy-tree-edge" x1="' + x1 + '" y1="' + y1 + '" x2="' + x2 + '" y2="' + y2 + '"></line>';
      }).join("");

      const nodeMarkup = Array.from(nodes.values()).map(function (node) {
        const pos = positions.get(node.id);
        const genderClass = "gender-" + (node.gender || "unknown");
        const activeClass = node.id === activeNodeId ? " is-active" : "";
        const canExpandParents = node.has_parents ? "" : " is-disabled";
        const canExpandChildren = node.has_children ? "" : " is-disabled";
        return '<g class="lazy-tree-node ' + genderClass + activeClass + '" transform="translate(' + pos.x + ', ' + pos.y + ')">'
          + '<rect width="' + nodeWidth + '" height="' + nodeHeight + '" rx="8"></rect>'
          + '<text class="lazy-tree-name" x="12" y="24">' + escapeText(node.name) + '</text>'
          + '<text class="lazy-tree-meta" x="12" y="46">#' + node.id + ' · 第' + (node.generation_no || "") + '代</text>'
          + '<a href="/members/' + node.id + '/relations" target="_blank">'
          + '<g class="lazy-tree-action" transform="translate(86, 50)">'
          + '<rect width="22" height="18" rx="4"></rect>'
          + '<text x="5" y="13">🔗</text>'
          + '</g></a>'
          + '<g class="lazy-tree-action' + canExpandParents + '" data-action="parents" data-id="' + node.id + '" transform="translate(112, 50)">'
          + '<rect width="22" height="18" rx="4"></rect><text x="7" y="13">←</text></g>'
          + '<g class="lazy-tree-action' + canExpandChildren + '" data-action="children" data-id="' + node.id + '" transform="translate(138, 50)">'
          + '<rect width="22" height="18" rx="4"></rect><text x="7" y="13">→</text></g>'
          + '</g>';
      }).join("");

      svg.innerHTML = edgeMarkup + nodeMarkup;
    }

    async function loadRoots() {
      try {
        setStatus("正在加载根成员...");
        const data = await getJson("/genealogies/" + gid + "/tree-roots");
        nodes.clear();
        edges.clear();
        expandedChildren.clear();
        expandedParents.clear();
        centeredMode = false;
        data.members.forEach(function (member) {
          addNode(member);
        });
        activeNodeId = data.members[0] ? data.members[0].id : null;
        draw();
        var msg = "已加载 " + data.members.length + " 个根成员";
        if (activeNodeId) msg += "，点击节点右下角箭头继续展开。";
        setStatus(msg);
      } catch (error) {
        setStatus("根成员加载失败：" + error.message, "danger");
      }
    }

    async function focusMember() {
      const memberId = Number(document.getElementById("focusMemberInput").value);
      if (!memberId) {
        setStatus("请输入有效的成员 ID。", "warning");
        return;
      }
      try {
        setStatus("正在定位成员...");
        const data = await getJson("/genealogies/" + gid + "/tree-node/" + memberId);
        nodes.clear();
        edges.clear();
        expandedChildren.clear();
        expandedParents.clear();
        centeredMode = true;
        addNode(data.member, 0);
        activeNodeId = data.member.id;
        draw();
        setStatus("已定位到 " + data.member.name + " #" + data.member.id + "。左箭头加载父母祖先，右箭头加载子女后代。");
      } catch (error) {
        setStatus("成员定位失败：请确认该 ID 属于当前族谱。", "danger");
      }
    }

    async function expandNode(memberId, direction) {
      const loadedSet = direction === "children" ? expandedChildren : expandedParents;
      if (loadedSet.has(memberId)) {
        setStatus("该方向已经展开过。");
        return;
      }
      try {
        activeNodeId = memberId;
        setStatus("正在加载相邻成员...");
        const data = await getJson("/genealogies/" + gid + "/tree-node/" + memberId + "/" + direction);
        const currentNode = nodes.get(memberId);
        const currentColumn = currentNode && typeof currentNode._column === "number"
          ? currentNode._column
          : (currentNode ? currentNode.generation_no || 1 : 0);
        const nextColumn = direction === "children" ? currentColumn + 1 : currentColumn - 1;
        data.members.forEach(function (member) {
          addNode(member, centeredMode ? nextColumn : undefined);
          if (direction === "children") {
            addEdge(memberId, member.id);
          } else {
            addEdge(member.id, memberId);
          }
        });
        loadedSet.add(memberId);
        draw();
        var dirLabel = direction === "children" ? "子女" : "父母";
        setStatus("已加载 " + data.members.length + " 个" + dirLabel + "节点。当前可视节点：" + nodes.size + "/" + nodeLimit + "。");
      } catch (error) {
        setStatus("节点展开失败：" + error.message, "danger");
      }
    }

    svg.addEventListener("click", function (event) {
      const target = event.target.closest(".lazy-tree-action");
      if (!target || target.classList.contains("is-disabled")) return;
      expandNode(Number(target.dataset.id), target.dataset.action);
    });

    document.getElementById("loadRootsButton").addEventListener("click", loadRoots);
    document.getElementById("focusMemberButton").addEventListener("click", focusMember);
    document.getElementById("clearTreeButton").addEventListener("click", clearTree);
    document.getElementById("focusMemberInput").addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        event.preventDefault();
        focusMember();
      }
    });

    draw();
  }
</script>
{% endblock %}
