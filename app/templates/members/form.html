{% extends "base.html" %}
{% block title %}{{ "编辑成员" if member and member.id else "添加成员" }}{% endblock %}
{% block content %}
<div class="form-shell">
  <h1 class="h3 mb-3">{{ "编辑成员" if member and member.id else "添加成员" }}</h1>
  <form method="post">
    <div class="mb-3">
      <label class="form-label">姓名</label>
      <input class="form-control" name="name" value="{{ member.name if member else '' }}" required>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">性别</label>
        <select class="form-select" name="gender">
          {% set gender = member.gender if member else "unknown" %}
          <option value="unknown" {% if gender == "unknown" %}selected{% endif %}>未知</option>
          <option value="male" {% if gender == "male" %}selected{% endif %}>男</option>
          <option value="female" {% if gender == "female" %}selected{% endif %}>女</option>
        </select>
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">代数</label>
        <input class="form-control" name="generation_no" type="number" min="1" value="{{ member.generation_no if member else 1 }}">
      </div>
    </div>
    <div class="row">
      <div class="col-md-6 mb-3">
        <label class="form-label">生年</label>
        <input class="form-control" name="birth_year" type="number" value="{{ member.birth_year if member and member.birth_year else '' }}">
      </div>
      <div class="col-md-6 mb-3">
        <label class="form-label">卒年</label>
        <input class="form-control" name="death_year" type="number" value="{{ member.death_year if member and member.death_year else '' }}">
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">生平简介</label>
      <textarea class="form-control" name="biography" rows="4">{{ member.biography if member and member.biography else '' }}</textarea>
    </div>
    <button class="btn btn-primary" type="submit">保存</button>
    <a class="btn btn-outline-secondary" href="{{ url_for('genealogies.members', id=genealogy.id) }}">返回</a>
  </form>
</div>
{% endblock %}
